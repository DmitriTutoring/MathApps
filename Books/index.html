  <style>
    body { min-height: 100dvh; display: flex; flex-direction: column; }
    .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px 20px; gap: 16px; }
    .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); align-self: flex-start; max-width: 880px; width: 100%; }
    .book-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; max-width: 880px; width: 100%; }
    .book-card {
      background: var(--bg-card); border: 1.5px solid var(--border);
      border-top: 3px solid var(--icon);
      border-radius: 12px; padding: 18px 12px; text-align: center;
      text-decoration: none; color: var(--text);
      display: block; box-shadow: var(--shadow);
      transition: box-shadow 0.2s, transform 0.2s, background 0.2s;
    }
    .book-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
    .book-icon { margin-bottom: 8px; color: var(--icon); display: flex; align-items: center; justify-content: center; }
    .book-icon svg { width: 26px; height: 26px; }
    .book-title { font-family: 'Lora', Georgia, serif; font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .book-desc { font-size: 12px; color: var(--text-sub); }
    @media (max-width: 600px) {
      .main { padding: 20px 14px; gap: 12px; justify-content: flex-start; padding-top: 24px; }
      .book-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .book-card { padding: 14px 10px; }
      .book-icon svg { width: 24px; height: 24px; }
      .book-title { font-size: 14px; }
    }
  </style>
</head>
