<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wizualizacja ułamków</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>

  :root {
    --bg: #f5f0e8; --bg2: #ebe5d9; --bg-card: #ffffff;
    --border: #e0d8cc; --text: #2c2c2c; --text-muted: #888; --text-sub: #777;
    --input-bg: #fdfcf9; --input-border: #c8c0b4; --hover-bg: #e4ddd1;
    --accent: #7a6a55; --divider: #d8d0c4;
    --shadow: 0 2px 10px rgba(0,0,0,0.05); --shadow-hover: 0 8px 24px rgba(0,0,0,0.10);
  }
  [data-theme="dark"] {
    --bg: #1c1b18; --bg2: #242320; --bg-card: #242320;
    --border: #38362f; --text: #e8e2d8; --text-muted: #6a6455; --text-sub: #8a8070;
    --input-bg: #2a2825; --input-border: #4a4840; --hover-bg: #2e2c28;
    --accent: #a08c70; --divider: #3a3830;
    --shadow: 0 2px 10px rgba(0,0,0,0.3); --shadow-hover: 0 8px 24px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    transition: background 0.2s, color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Topbar ── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; background: var(--bg2); border-bottom: 1px solid var(--border);
    flex-shrink: 0; transition: background 0.2s, border-color 0.2s; min-height: 54px;
  }
  .topbar-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .back-btn {
    font-size: 14px; font-weight: 600; color: var(--text-muted); text-decoration: none;
    padding: 8px 14px; border: 1.5px solid var(--input-border); border-radius: 8px;
    background: var(--input-bg); white-space: nowrap;
    transition: background 0.15s, color 0.15s;
  }
  .back-btn:hover { background: var(--hover-bg); color: var(--text); }

  /* ── Dark toggle ── */
  .theme-toggle { display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; }
  .theme-toggle input[type="checkbox"] { display: none; }
  .toggle-track {
    width: 42px; height: 24px; background: var(--divider); border-radius: 12px;
    position: relative; transition: background 0.2s; flex-shrink: 0;
  }
  .theme-toggle input:checked + .toggle-track { background: var(--accent); }
  .toggle-thumb {
    width: 18px; height: 18px; background: white; border-radius: 50%;
    position: absolute; top: 3px; left: 3px; transition: transform 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
  }
  .theme-toggle input:checked + .toggle-track .toggle-thumb { transform: translateX(18px); }
  .toggle-icon { font-size: 15px; line-height: 1; }

  /* ── Controls bar (desktop) ── */
  .controls-bar {
    flex-shrink: 0; display: flex; flex-wrap: wrap;
    align-items: center; justify-content: center;
    gap: 14px 22px; padding: 12px 18px 16px;
    background: var(--bg2); border-top: 1px solid var(--border);
    transition: background 0.2s, border-color 0.2s;
  }
  .control-group { display: flex; align-items: center; gap: 9px; }
  .ctrl-label {
    font-size: 12px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; min-width: 60px;
  }
  .bar-divider { width: 1px; height: 28px; background: var(--divider); flex-shrink: 0; }

  /* ── Form elements (desktop) ── */
  input[type="text"] {
    width: 58px; padding: 7px 8px;
    border: 1.5px solid var(--input-border); border-radius: 8px;
    font-size: 15px; font-weight: 600; font-family: 'Inter', sans-serif;
    text-align: center; background: var(--input-bg); color: var(--text);
    outline: none; transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="range"] { accent-color: var(--accent); cursor: pointer; width: 130px; height: 22px; }
  select {
    padding: 7px 10px; border: 1.5px solid var(--input-border); border-radius: 8px;
    font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif;
    background: var(--input-bg); color: var(--text); cursor: pointer; outline: none;
    transition: background 0.2s, color 0.2s;
  }
  input[type="color"] {
    width: 38px; height: 34px; border: 1.5px solid var(--input-border);
    border-radius: 8px; cursor: pointer; background: var(--input-bg); padding: 2px;
  }

  /* ── Cards ── */
  .card-grid { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
  .card {
    background: var(--bg-card); border: 1.5px solid var(--border); border-radius: 14px;
    padding: 28px 20px; text-align: center; text-decoration: none; color: var(--text);
    display: block; box-shadow: var(--shadow); width: 220px;
    transition: box-shadow 0.2s, transform 0.2s, background 0.2s, border-color 0.2s;
  }
  .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
  .card-icon { font-size: 40px; margin-bottom: 12px; }
  .card-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .card-desc { font-size: 13px; color: var(--text-sub); line-height: 1.5; }

  /* ════════════════════════════════
     MOBILE  (≤ 600px)
     ════════════════════════════════ */
  @media (max-width: 600px) {

    /* Topbar */
    .topbar { padding: 12px 14px; min-height: 52px; }
    .topbar-title { font-size: 14px; }
    .back-btn { font-size: 13px; padding: 7px 12px; }
    .toggle-track { width: 38px; height: 22px; }
    .toggle-thumb { width: 16px; height: 16px; }
    .theme-toggle input:checked + .toggle-track .toggle-thumb { transform: translateX(16px); }

    /* Controls: stack each group as its own full-width row */
    .controls-bar {
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
      padding: 12px 14px 16px;
    }
    .bar-divider { display: none; }
    .control-group {
      width: 100%;
      justify-content: space-between;
    }
    .ctrl-label {
      font-size: 13px;
      min-width: 80px;
      flex-shrink: 0;
    }
    input[type="text"] {
      width: 60px;
      font-size: 16px;
      padding: 8px;
      flex-shrink: 0;
    }
    input[type="range"] {
      flex: 1;
      width: auto;
      height: 28px;
    }
    select {
      flex: 1;
      font-size: 15px;
      padding: 8px 10px;
    }
    input[type="color"] {
      width: 44px; height: 38px; flex-shrink: 0;
    }

    /* Cards: single column, full width */
    .card-grid { flex-direction: column; align-items: stretch; gap: 12px; width: 100%; }
    .card {
      width: 100%; padding: 20px 18px;
      display: flex; align-items: center; gap: 16px; text-align: left;
    }
    .card-icon { font-size: 36px; margin-bottom: 0; flex-shrink: 0; }
    .card-title { font-size: 16px; margin-bottom: 3px; }
    .card-desc { font-size: 13px; }
  }

    body { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    .canvas-wrap {
      flex: 1; min-height: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px; padding: 10px; overflow: hidden;
    }
    .frac-display { flex-shrink: 0; display: flex; align-items: center; gap: 10px; line-height: 1; }
    .frac-stack { display: inline-flex; flex-direction: column; align-items: center; font-size: 52px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
    .frac-line { width: 100%; min-width: 30px; height: 3px; background: currentColor; margin: 3px 0; border-radius: 2px; }
    .frac-decimal { font-size: 22px; font-weight: 500; color: var(--text-muted); }
    svg { display: block; flex: 1; min-height: 0; max-width: 100%; max-height: 100%; }
    @media (max-width: 600px) {
      .frac-stack { font-size: 44px; }
      .frac-decimal { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="topbar-title">Wizualizacja ułamków</span>
    <div class="topbar-right">
      <label class="theme-toggle" title="Tryb ciemny / jasny">
      <input type="checkbox" id="themeToggle">
      <span class="toggle-track"><span class="toggle-thumb"></span></span>
      <span class="toggle-icon">🌙</span>
    </label>
      <a href="../index.html" class="back-btn">← Powrót</a>
    </div>
  </div>
  <div class="canvas-wrap">
    <div class="frac-display">
      <span class="frac-stack">
        <span id="fracNum">3</span>
        <span class="frac-line"></span>
        <span id="fracDen">4</span>
      </span>
      <span class="frac-decimal">= <span id="decimalText">0.75</span></span>
    </div>
    <svg id="svg"></svg>
  </div>
  <div class="controls-bar">
    <div class="control-group">
      <span class="ctrl-label">Licznik</span>
      <input id="num" type="text" inputmode="numeric" value="3">
      <input id="nums" type="range" min="0" max="10" step="1" value="3">
    </div>
    <div class="bar-divider"></div>
    <div class="control-group">
      <span class="ctrl-label">Mianownik</span>
      <input id="den" type="text" inputmode="numeric" value="4">
      <input id="dens" type="range" min="1" max="20" step="1" value="4">
    </div>
    <div class="bar-divider"></div>
    <div class="control-group">
      <span class="ctrl-label">Widok</span>
      <select id="modeSelect">
        <option value="pie" selected>Koło</option>
        <option value="bar">Pasek</option>
      </select>
    </div>
    <div class="control-group">
      <span class="ctrl-label">Kolor</span>
      <input id="colorPicker" type="color" value="#4a90d9">
    </div>
  </div>
  <script>
  (function() {
    const toggle = document.getElementById('themeToggle');
    const root = document.documentElement;
    if (localStorage.getItem('theme') === 'dark') {
      root.setAttribute('data-theme', 'dark');
      if (toggle) toggle.checked = true;
    }
    if (toggle) {
      toggle.addEventListener('change', () => {
        if (toggle.checked) {
          root.setAttribute('data-theme', 'dark');
          localStorage.setItem('theme', 'dark');
        } else {
          root.removeAttribute('data-theme');
          localStorage.setItem('theme', 'light');
        }
        window.dispatchEvent(new Event('themechange'));
      });
    }
  })();
</script>
  <script>
  const numInput=document.getElementById('num'),denInput=document.getElementById('den');
  const numSlider=document.getElementById('nums'),denSlider=document.getElementById('dens');
  const modeSelect=document.getElementById('modeSelect'),colorPicker=document.getElementById('colorPicker');
  const fracNum=document.getElementById('fracNum'),fracDen=document.getElementById('fracDen');
  const decimalText=document.getElementById('decimalText'),svg=document.getElementById('svg');
  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
  function hexToRgba(hex,alpha){hex=hex.replace('#','');const r=parseInt(hex.substring(0,2),16),g=parseInt(hex.substring(2,4),16),b=parseInt(hex.substring(4,6),16);return `rgba(${r},${g},${b},${alpha})`;}
  function isDark(){return document.documentElement.getAttribute('data-theme')==='dark';}
  function draw(){
    let num=parseInt(numInput.value)||0,den=parseInt(denInput.value)||1;
    den=Math.max(1,Math.min(20,den));num=clamp(num,0,den);
    numSlider.max=den;numSlider.value=num;numInput.value=num;
    denSlider.value=den;denInput.value=den;
    fracNum.textContent=num;fracDen.textContent=den;
    decimalText.textContent=(num/den).toFixed(4).replace(/\.?0+$/,'');
    const mode=modeSelect.value,fillColor=hexToRgba(colorPicker.value,0.65);
    const dark=isDark(),unfill=dark?'rgba(255,255,255,0.06)':'rgba(200,200,200,0.12)',stroke=dark?'#999':'#222';
    const PAD=40;let s='';
    if(mode==='pie'){
      const vs=440,cx=vs/2,cy=vs/2,r=180;
      svg.setAttribute('viewBox',`0 0 ${vs} ${vs}`);svg.setAttribute('width','100%');svg.setAttribute('height','100%');svg.setAttribute('preserveAspectRatio','xMidYMid meet');
      if(den>0){
        const as=(2*Math.PI)/den;
        for(let i=0;i<den;i++){const sa=-Math.PI/2+i*as,ea=sa+as,x1=cx+r*Math.cos(sa),y1=cy+r*Math.sin(sa),x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea),la=as>Math.PI?1:0,fill=i<num?fillColor:unfill;s+=`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${la},1 ${x2},${y2} Z" fill="${fill}" stroke="none"/>`;}
        for(let i=0;i<den;i++){const a=-Math.PI/2+i*as;s+=`<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(a)}" y2="${cy+r*Math.sin(a)}" stroke="${stroke}" stroke-opacity="0.2" stroke-width="1"/>`;}
        s+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${stroke}" stroke-width="2"/>`;
      }
    } else {
      const U=48,BH=100,tw=den*U+2*PAD,th=BH+2*PAD;
      svg.setAttribute('viewBox',`0 0 ${tw} ${th}`);svg.setAttribute('width','100%');svg.setAttribute('height','100%');svg.setAttribute('preserveAspectRatio','xMidYMid meet');
      const bx=PAD,by=PAD;
      s+=`<rect x="${bx}" y="${by}" width="${den*U}" height="${BH}" rx="6" fill="none" stroke="${stroke}" stroke-width="2"/>`;
      if(num>0){s+=`<rect x="${bx}" y="${by}" width="${num*U}" height="${BH}" rx="6" fill="${fillColor}"/>`;s+=`<rect x="${bx}" y="${by}" width="${den*U}" height="${BH}" rx="6" fill="none" stroke="${stroke}" stroke-width="2"/>`;}
      for(let i=1;i<den;i++){const x=bx+i*U;s+=`<line x1="${x}" y1="${by}" x2="${x}" y2="${by+BH}" stroke="${stroke}" stroke-opacity="0.2" stroke-width="0.8"/>`;}
    }
    svg.innerHTML=s;
  }
  function onNum(){let v=parseInt(numInput.value)||0;const d=parseInt(denInput.value)||1;v=clamp(v,0,d);numInput.value=v;numSlider.value=v;draw();}
  function onDen(){let v=parseInt(denInput.value)||1;v=Math.max(1,Math.min(20,v));denInput.value=v;denSlider.value=v;let n=parseInt(numInput.value)||0;if(n>v){n=v;numInput.value=n;numSlider.value=n;}numSlider.max=v;draw();}
  numInput.oninput=onNum;denInput.oninput=onDen;
  numSlider.oninput=()=>{numInput.value=numSlider.value;draw();};
  denSlider.oninput=()=>{const v=parseInt(denSlider.value);denInput.value=v;let n=parseInt(numInput.value)||0;if(n>v){n=v;numInput.value=n;numSlider.value=n;}numSlider.max=v;draw();};
  modeSelect.onchange=()=>draw();colorPicker.oninput=()=>draw();
  window.addEventListener('themechange',draw);
  draw();
  </script>
</body>
</html>
