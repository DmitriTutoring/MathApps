<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Układ współrzędnych</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    if (localStorage.getItem('theme') !== 'light') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
  <link rel="stylesheet" href="../../shared/common.css">
  <style>
    body { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    .canvas-wrap {
      flex: 1; min-height: 0; width: 100%; position: relative;
      overflow: hidden;
      touch-action: none;
    }
    svg { display: block; width: 100%; height: 100%; }
    .reset-btn {
      position: absolute;
      top: 12px; right: 12px;
      z-index: 10;
      padding: 6px 14px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s;
    }
    .reset-btn:hover { background: var(--hover-bg); }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="topbar-title">Układ współrzędnych</span>
    <div class="topbar-right">
      <label class="theme-toggle" title="Tryb ciemny / jasny">
        <input type="checkbox" id="themeToggle">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        <span class="toggle-icon">🌙</span>
      </label>
      <a href="../index.html" class="back-btn">← Powrót</a>
    </div>
  </div>

  <div class="canvas-wrap" id="canvasContainer">
    <svg id="svg"></svg>
    <button class="reset-btn" id="resetBtn">Reset widoku</button>
  </div>

  <script src="../../shared/theme.js"></script>
  <script>
    const svg = document.getElementById('svg');
    const container = document.getElementById('canvasContainer');
    const resetBtn = document.getElementById('resetBtn');

    const defaultView = { x: -5, y: -5, w: 10, h: 10 };
    let view = { ...defaultView };

    function applyView() {
      svg.setAttribute('viewBox', `${view.x} ${view.y} ${view.w} ${view.h}`);
      drawContents();
    }

    // ── Drawing with screen‑consistent line widths ──
    function drawContents() {
      const dark = document.documentElement.hasAttribute('data-theme');
      const bg = dark ? '#1c1b18' : '#f5f0e8';
      const axisColor = dark ? '#ccc' : '#333';
      const majorGridColor = dark ? '#555' : '#aaa';
      const minorGridColor = dark ? '#3a3a3a' : '#ddd';
      const labelColor = dark ? '#e8e2d8' : '#222';

      const containerW = container.clientWidth;
      const containerH = container.clientHeight;
      if (containerW <= 0 || containerH <= 0) return;

      // Factor to convert screen pixels to SVG viewBox units
      const pixelToSVG = view.w / containerW;
      // Target sizes in screen pixels (approximate)
      const axisWidthSVG = 2.5 * pixelToSVG;
      const majorGridWidthSVG = 1.2 * pixelToSVG;
      const minorGridWidthSVG = 0.6 * pixelToSVG;
      const labelFontSizeSVG = Math.max(1, 14 * pixelToSVG); // minimum 1 SVG unit

      svg.innerHTML = '';

      // Background
      const bgRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      bgRect.setAttribute('x', view.x);
      bgRect.setAttribute('y', view.y);
      bgRect.setAttribute('width', view.w);
      bgRect.setAttribute('height', view.h);
      bgRect.setAttribute('fill', bg);
      svg.appendChild(bgRect);

      // Determine nice step for grid lines
      const range = view.w;
      const targetTicks = 10;
      let rawStep = range / targetTicks;
      const magnitude = Math.pow(10, Math.floor(Math.log10(rawStep)));
      const residual = rawStep / magnitude;
      let step;
      if (residual < 1.5) step = 1 * magnitude;
      else if (residual < 3.5) step = 2 * magnitude;
      else if (residual < 7.5) step = 5 * magnitude;
      else step = 10 * magnitude;

      // Limit step so we never draw more than ~100 lines total (vertical+horizontal)
      const maxLines = 120;
      let linesCount = (view.w / step) + (view.h / step);
      while (linesCount > maxLines) {
        step *= 2;
        linesCount = (view.w / step) + (view.h / step);
      }

      const minorStep = step / 5;
      // Draw minor lines only if they are at least 20 screen pixels apart
      const drawMinor = (minorStep / pixelToSVG) >= 20 && linesCount < 80;

      function createLine(x1, y1, x2, y2, color, width) {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1);
        line.setAttribute('y1', y1);
        line.setAttribute('x2', x2);
        line.setAttribute('y2', y2);
        line.setAttribute('stroke', color);
        line.setAttribute('stroke-width', width);
        svg.appendChild(line);
      }

      // Vertical lines
      const startX = Math.ceil(view.x / step) * step;
      for (let x = startX; x <= view.x + view.w; x += step) {
        createLine(x, view.y, x, view.y + view.h, majorGridColor, majorGridWidthSVG);
      }
      if (drawMinor) {
        const minorStartX = Math.ceil(view.x / minorStep) * minorStep;
        for (let x = minorStartX; x <= view.x + view.w; x += minorStep) {
          if (Math.abs(x % step) < 0.001) continue;
          createLine(x, view.y, x, view.y + view.h, minorGridColor, minorGridWidthSVG);
        }
      }

      // Horizontal lines
      const startY = Math.ceil(view.y / step) * step;
      for (let y = startY; y <= view.y + view.h; y += step) {
        createLine(view.x, y, view.x + view.w, y, majorGridColor, majorGridWidthSVG);
      }
      if (drawMinor) {
        const minorStartY = Math.ceil(view.y / minorStep) * minorStep;
        for (let y = minorStartY; y <= view.y + view.h; y += minorStep) {
          if (Math.abs(y % step) < 0.001) continue;
          createLine(view.x, y, view.x + view.w, y, minorGridColor, minorGridWidthSVG);
        }
      }

      // Axes
      createLine(view.x, 0, view.x + view.w, 0, axisColor, axisWidthSVG);
      createLine(0, view.y, 0, view.y + view.h, axisColor, axisWidthSVG);

      // Labels
      function addText(x, y, text, anchor = 'middle') {
        const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        txt.setAttribute('x', x);
        txt.setAttribute('y', y);
        txt.setAttribute('font-size', labelFontSizeSVG);
        txt.setAttribute('font-family', 'Inter, sans-serif');
        txt.setAttribute('fill', labelColor);
        txt.setAttribute('text-anchor', anchor);
        txt.textContent = text;
        svg.appendChild(txt);
      }

      // Limit labels to ~10 per axis
      const labelStep = step; // only at major positions
      const maxLabelsPerAxis = 12;
      const xCount = (view.w / labelStep);
      const yCount = (view.h / labelStep);
      const actualLabelStepX = (xCount > maxLabelsPerAxis) ? step * 2 : step;
      const actualLabelStepY = (yCount > maxLabelsPerAxis) ? step * 2 : step;

      // X-axis labels
      const labelStartX = Math.ceil(view.x / actualLabelStepX) * actualLabelStepX;
      for (let x = labelStartX; x <= view.x + view.w; x += actualLabelStepX) {
        if (Math.abs(x) < 0.001) continue;
        addText(x, 0 + labelFontSizeSVG * 1.2, x.toString(), 'middle');
      }

      // Y-axis labels
      const labelStartY = Math.ceil(view.y / actualLabelStepY) * actualLabelStepY;
      for (let y = labelStartY; y <= view.y + view.h; y += actualLabelStepY) {
        if (Math.abs(y) < 0.001) continue;
        addText(0 + labelFontSizeSVG * 0.6, y + labelFontSizeSVG * 0.4, y.toString(), 'end');
      }

      // Origin label
      addText(0 + labelFontSizeSVG * 0.6, 0 - labelFontSizeSVG * 0.4, '0', 'end');
    }

    // ── Panning ──
    let isPanning = false;
    let lastMouseX, lastMouseY;

    container.addEventListener('mousedown', (e) => {
      isPanning = true;
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;
      container.style.cursor = 'grabbing';
    });

    window.addEventListener('mousemove', (e) => {
      if (!isPanning) return;
      const dx = e.clientX - lastMouseX;
      const dy = e.clientY - lastMouseY;
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;

      const scaleX = view.w / container.clientWidth;
      const scaleY = view.h / container.clientHeight;
      view.x -= dx * scaleX;
      view.y -= dy * scaleY;
      applyView();
    });

    window.addEventListener('mouseup', () => {
      if (isPanning) {
        isPanning = false;
        container.style.cursor = 'default';
      }
    });

    // Touch pan
    container.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        isPanning = true;
        lastMouseX = e.touches[0].clientX;
        lastMouseY = e.touches[0].clientY;
      }
    }, { passive: false });

    container.addEventListener('touchmove', (e) => {
      if (!isPanning || e.touches.length !== 1) return;
      e.preventDefault();
      const dx = e.touches[0].clientX - lastMouseX;
      const dy = e.touches[0].clientY - lastMouseY;
      lastMouseX = e.touches[0].clientX;
      lastMouseY = e.touches[0].clientY;
      const scaleX = view.w / container.clientWidth;
      const scaleY = view.h / container.clientHeight;
      view.x -= dx * scaleX;
      view.y -= dy * scaleY;
      applyView();
    }, { passive: false });

    container.addEventListener('touchend', () => {
      isPanning = false;
      container.style.cursor = 'default';
    });

    // ── Zoom (cursor‑centered) ──
    container.addEventListener('wheel', (e) => {
      e.preventDefault();
      const rect = container.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      const worldX = view.x + (mouseX / container.clientWidth) * view.w;
      const worldY = view.y + (mouseY / container.clientHeight) * view.h;

      const zoomFactor = 1.1;
      let newW, newH;
      if (e.deltaY < 0) {
        newW = view.w / zoomFactor;
        newH = view.h / zoomFactor;
      } else {
        newW = view.w * zoomFactor;
        newH = view.h * zoomFactor;
      }
      if (newW < 0.01 || newW > 10000 || newH < 0.01 || newH > 10000) return;

      const newX = worldX - (mouseX / container.clientWidth) * newW;
      const newY = worldY - (mouseY / container.clientHeight) * newH;

      view.x = newX;
      view.y = newY;
      view.w = newW;
      view.h = newH;
      applyView();
    }, { passive: false });

    // ── Reset ──
    resetBtn.addEventListener('click', () => {
      view = { ...defaultView };
      applyView();
    });

    // ── Theme change ──
    window.addEventListener('themechange', drawContents);

    // ── Resize ──
    new ResizeObserver(() => {
      drawContents();
    }).observe(container);

    // ── Initial draw ──
    applyView();
  </script>
</body>
</html>
