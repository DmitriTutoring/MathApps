<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Układ współrzędnych</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23c4601e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><line x1='9' x2='9' y1='4' y2='20'/><path d='M4 7c0-1.7 1.3-3 3-3h13'/><path d='M18 20c-1.7 0-3-1.3-3-3V4'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Lora:wght@600;700&display=swap" rel="stylesheet">
  <script>
    if (localStorage.getItem('theme') !== 'light') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
  <link rel="stylesheet" href="../../shared/common.css">
  <style>
    body { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    .canvas-wrap {
      flex: 1; min-height: 0; width: 100%; position: relative;
      overflow: hidden;
      touch-action: none;
    }
    svg { display: block; width: 100%; height: 100%; }
    .reset-btn {
      position: absolute;
      top: 12px; right: 12px;
      z-index: 10;
      padding: 6px 14px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s;
    }
    .reset-btn:hover { background: var(--hover-bg); }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="topbar-title">Układ współrzędnych</span>
    <div class="topbar-right">
      <button class="theme-btn" id="themeToggle" title="Tryb ciemny / jasny"></button>
      <a href="../index.html" class="back-btn"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/></svg> Powrót</a>
    </div>
  </div>

  <div class="canvas-wrap" id="canvasContainer">
    <svg id="svg"></svg>
    <button class="reset-btn" id="resetBtn">Reset widoku</button>
  </div>

  <script src="../../shared/theme.js"></script>
  <script>
    const svg = document.getElementById('svg');
    const container = document.getElementById('canvasContainer');
    const resetBtn = document.getElementById('resetBtn');

    function getDefaultView() {
      const w = 20;
      const aspect = container.clientHeight / container.clientWidth;
      const rangeY = w * (aspect > 0 ? aspect : 1);
      return { x: -w / 2, topY: rangeY / 2, w, rangeY };
    }

    let view = getDefaultView();

    function applyView() {
      svg.setAttribute('viewBox', `${view.x} ${-view.topY} ${view.w} ${view.rangeY}`);
      drawContents();
    }

    function formatNumber(n) {
      if (Number.isInteger(n)) return n.toString();
      const fixed = n.toFixed(10);
      return fixed.replace(/\.?0+$/, '');
    }

    function svgY(y) {
      return -y;
    }

    function drawContents() {
      const dark = document.documentElement.hasAttribute('data-theme');
      const bg = dark ? '#1c1b18' : '#f5f0e8';
      const axisColor = dark ? '#ccc' : '#333';
      const majorGridColor = dark ? '#555' : '#aaa';
      const minorGridColor = dark ? '#3a3a3a' : '#ddd';
      const labelColor = dark ? '#e8e2d8' : '#222';

      const containerW = container.clientWidth;
      const containerH = container.clientHeight;
      if (containerW <= 0 || containerH <= 0) return;

      const pixelToSVG = view.w / containerW;
      const AXIS_PX = 2.5;
      const MAJOR_GRID_PX = 1.2;
      const MINOR_GRID_PX = 0.6;
      const LABEL_FONT_PX = 16;

      const axisWidthSVG = AXIS_PX * pixelToSVG;
      const majorGridWidthSVG = MAJOR_GRID_PX * pixelToSVG;
      const minorGridWidthSVG = MINOR_GRID_PX * pixelToSVG;
      const labelFontSizeSVG = LABEL_FONT_PX * pixelToSVG;

      const range = view.w;
      const targetTicks = 10;
      let rawStep = range / targetTicks;
      const magnitude = Math.pow(10, Math.floor(Math.log10(rawStep)));
      const residual = rawStep / magnitude;
      let step;
      if (residual < 1.5) step = 1 * magnitude;
      else if (residual < 3.5) step = 2 * magnitude;
      else if (residual < 7.5) step = 5 * magnitude;
      else step = 10 * magnitude;

      const maxLines = 120;
      let linesCount = (view.w / step) + (view.rangeY / step);
      while (linesCount > maxLines) { step *= 2; linesCount = (view.w / step) + (view.rangeY / step); }

      const minorStep = step / 5;
      const drawMinor = (minorStep / pixelToSVG) >= 20 && linesCount < 80;

      function createLine(x1, y1, x2, y2, color, width) {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1); line.setAttribute('y1', y1);
        line.setAttribute('x2', x2); line.setAttribute('y2', y2);
        line.setAttribute('stroke', color); line.setAttribute('stroke-width', width);
        svg.appendChild(line);
      }

      svg.innerHTML = '';
      const bgRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      bgRect.setAttribute('x', view.x);
      bgRect.setAttribute('y', svgY(view.topY));
      bgRect.setAttribute('width', view.w);
      bgRect.setAttribute('height', view.rangeY);
      bgRect.setAttribute('fill', bg);
      svg.appendChild(bgRect);

      // vertical grid
      const startX = Math.ceil(view.x / step) * step;
      for (let x = startX; x <= view.x + view.w; x += step) {
        createLine(x, svgY(view.topY), x, svgY(view.topY - view.rangeY), majorGridColor, majorGridWidthSVG);
      }
      if (drawMinor) {
        const minorStartX = Math.ceil(view.x / minorStep) * minorStep;
        for (let x = minorStartX; x <= view.x + view.w; x += minorStep) {
          if (Math.abs(x % step) < 0.001) continue;
          createLine(x, svgY(view.topY), x, svgY(view.topY - view.rangeY), minorGridColor, minorGridWidthSVG);
        }
      }

      // horizontal grid
      const startY = Math.ceil((view.topY - view.rangeY) / step) * step;
      for (let y = startY; y <= view.topY; y += step) {
        createLine(view.x, svgY(y), view.x + view.w, svgY(y), majorGridColor, majorGridWidthSVG);
      }
      if (drawMinor) {
        const minorStartY = Math.ceil((view.topY - view.rangeY) / minorStep) * minorStep;
        for (let y = minorStartY; y <= view.topY; y += minorStep) {
          if (Math.abs(y % step) < 0.001) continue;
          createLine(view.x, svgY(y), view.x + view.w, svgY(y), minorGridColor, minorGridWidthSVG);
        }
      }

      // axes
      createLine(view.x, 0, view.x + view.w, 0, axisColor, axisWidthSVG);
      createLine(0, svgY(view.topY), 0, svgY(view.topY - view.rangeY), axisColor, axisWidthSVG);

      function addText(x, y, text, anchor = 'middle') {
        const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        txt.setAttribute('x', x); txt.setAttribute('y', y);
        txt.setAttribute('font-size', labelFontSizeSVG);
        txt.setAttribute('font-family', 'DM Sans, sans-serif');
        txt.setAttribute('fill', labelColor);
        txt.setAttribute('text-anchor', anchor);
        txt.textContent = text;
        svg.appendChild(txt);
      }

      const maxLabelsPerAxis = 12;
      const xCount = view.w / step;
      const actualLabelStepX = (xCount > maxLabelsPerAxis) ? step * 2 : step;
      const yCount = view.rangeY / step;
      const actualLabelStepY = (yCount > maxLabelsPerAxis) ? step * 2 : step;

      const labelStartX = Math.ceil(view.x / actualLabelStepX) * actualLabelStepX;
      for (let x = labelStartX; x <= view.x + view.w; x += actualLabelStepX) {
        if (Math.abs(x) < 0.001) continue;
        addText(x, labelFontSizeSVG * 1.2, formatNumber(x), 'middle');
      }

      const labelStartY = Math.ceil((view.topY - view.rangeY) / actualLabelStepY) * actualLabelStepY;
      for (let y = labelStartY; y <= view.topY; y += actualLabelStepY) {
        if (Math.abs(y) < 0.001) continue;
        addText(-labelFontSizeSVG * 0.6, svgY(y) + labelFontSizeSVG * 0.3, formatNumber(y), 'end');
      }

      addText(labelFontSizeSVG * 0.6, -labelFontSizeSVG * 0.4, '0', 'end');
    }

    // ── Panning ──
    let isPanning = false;
    let lastMouseX, lastMouseY;

    container.addEventListener('mousedown', (e) => {
      isPanning = true;
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;
      container.style.cursor = 'grabbing';
    });

    window.addEventListener('mousemove', (e) => {
      if (!isPanning) return;
      const dx = e.clientX - lastMouseX;
      const dy = e.clientY - lastMouseY;
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;

      const scaleX = view.w / container.clientWidth;
      const scaleY = view.rangeY / container.clientHeight;

      view.x -= dx * scaleX;
      view.topY += dy * scaleY;
      applyView();
    });

    window.addEventListener('mouseup', () => {
      if (isPanning) { isPanning = false; container.style.cursor = 'default'; }
    });

    // touch pan
    container.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        isPanning = true;
        lastMouseX = e.touches[0].clientX;
        lastMouseY = e.touches[0].clientY;
      }
    }, { passive: false });

    container.addEventListener('touchmove', (e) => {
      if (!isPanning || e.touches.length !== 1) return;
      e.preventDefault();
      const dx = e.touches[0].clientX - lastMouseX;
      const dy = e.touches[0].clientY - lastMouseY;
      lastMouseX = e.touches[0].clientX;
      lastMouseY = e.touches[0].clientY;
      const scaleX = view.w / container.clientWidth;
      const scaleY = view.rangeY / container.clientHeight;
      view.x -= dx * scaleX;
      view.topY += dy * scaleY;
      applyView();
    }, { passive: false });

    container.addEventListener('touchend', () => {
      isPanning = false;
      container.style.cursor = 'default';
    });

    // ── Zoom (cursor-centered) ──
    container.addEventListener('wheel', (e) => {
      e.preventDefault();
      const rect = container.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      const worldX = view.x + (mouseX / container.clientWidth) * view.w;
      const worldY = view.topY - (mouseY / container.clientHeight) * view.rangeY;

      const zoomFactor = 1.1;
      let newW, newH;
      if (e.deltaY < 0) {
        newW = view.w / zoomFactor;
        newH = view.rangeY / zoomFactor;
      } else {
        newW = view.w * zoomFactor;
        newH = view.rangeY * zoomFactor;
      }
      if (newW < 0.01 || newW > 10000 || newH < 0.01 || newH > 10000) return;

      view.x = worldX - (mouseX / container.clientWidth) * newW;
      view.topY = worldY + (mouseY / container.clientHeight) * newH;
      view.w = newW;
      view.rangeY = newH;
      applyView();
    }, { passive: false });

    resetBtn.addEventListener('click', () => {
      view = getDefaultView();
      applyView();
    });

    window.addEventListener('themechange', drawContents);
    new ResizeObserver(() => {
      view = getDefaultView();
      applyView();
    }).observe(container);
    applyView();
  </script>
</body>
</html>
