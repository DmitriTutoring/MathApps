<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Układ współrzędnych</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    if (localStorage.getItem('theme') !== 'light') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
  <link rel="stylesheet" href="../../shared/common.css">
  <style>
    body { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    .canvas-wrap {
      flex: 1; min-height: 0; width: 100%; position: relative;
      overflow: hidden;
      touch-action: none;           /* disable browser gestures, we handle them */
    }
    svg {
      display: block; width: 100%; height: 100%;
    }

    /* ── Reset button (top‑right corner of canvas) ── */
    .reset-btn {
      position: absolute;
      top: 12px; right: 12px;
      z-index: 10;
      padding: 6px 14px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s;
    }
    .reset-btn:hover { background: var(--hover-bg); }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="topbar-title">Układ współrzędnych</span>
    <div class="topbar-right">
      <label class="theme-toggle" title="Tryb ciemny / jasny">
        <input type="checkbox" id="themeToggle">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        <span class="toggle-icon">🌙</span>
      </label>
      <a href="../index.html" class="back-btn">← Powrót</a>
    </div>
  </div>

  <div class="canvas-wrap" id="canvasContainer">
    <svg id="svg"></svg>
    <button class="reset-btn" id="resetBtn">Reset widoku</button>
  </div>

  <script src="../../shared/theme.js"></script>
  <script>
    const svg = document.getElementById('svg');
    const container = document.getElementById('canvasContainer');
    const resetBtn = document.getElementById('resetBtn');

    // ── View state ──
    // viewBox = { x, y, w, h }  (world coordinates)
    const defaultView = { x: -5, y: -5, w: 10, h: 10 };
    let view = { ...defaultView };

    // Aspect ratio of the container
    function getContainerSize() {
      return { w: container.clientWidth, h: container.clientHeight };
    }

    // Set SVG viewBox from our view state
    function applyView() {
      svg.setAttribute('viewBox', `${view.x} ${view.y} ${view.w} ${view.h}`);
      drawContents();
    }

    // ── Drawing ──
    function drawContents() {
      const dark = document.documentElement.hasAttribute('data-theme');
      const bg = dark ? '#1c1b18' : '#f5f0e8';
      const axisColor = dark ? '#ccc' : '#333';
      const majorGridColor = dark ? '#555' : '#aaa';
      const minorGridColor = dark ? '#3a3a3a' : '#ddd';

      // Clear SVG
      svg.innerHTML = '';

      // Background
      const bgRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      bgRect.setAttribute('x', view.x);
      bgRect.setAttribute('y', view.y);
      bgRect.setAttribute('width', view.w);
      bgRect.setAttribute('height', view.h);
      bgRect.setAttribute('fill', bg);
      svg.appendChild(bgRect);

      // Determine nice step for grid lines based on view width
      const range = view.w; // roughly the horizontal range visible
      const targetTicks = 10; // about 10 major lines visible
      let rawStep = range / targetTicks;
      // Snap to nice numbers: 1, 2, 5, 10, 20, 50, …
      const magnitude = Math.pow(10, Math.floor(Math.log10(rawStep)));
      const residual = rawStep / magnitude;
      let step;
      if (residual < 1.5) step = 1 * magnitude;
      else if (residual < 3.5) step = 2 * magnitude;
      else if (residual < 7.5) step = 5 * magnitude;
      else step = 10 * magnitude;

      // Minor step = step / 5 (if not too small in pixel space)
      const minorStep = step / 5;
      const minorMinPixels = 20; // only draw minor lines if at least this many pixels apart
      const pixelsPerUnit = container.clientWidth / view.w;
      const drawMinor = (minorStep * pixelsPerUnit) >= minorMinPixels;

      // Helper to create line
      function createLine(x1, y1, x2, y2, color, width, dash = '') {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1);
        line.setAttribute('y1', y1);
        line.setAttribute('x2', x2);
        line.setAttribute('y2', y2);
        line.setAttribute('stroke', color);
        line.setAttribute('stroke-width', width);
        if (dash) line.setAttribute('stroke-dasharray', dash);
        svg.appendChild(line);
      }

      // Draw grid lines
      // Vertical lines
      const startX = Math.ceil(view.x / step) * step;
      for (let x = startX; x <= view.x + view.w; x += step) {
        const isMajor = (x % step === 0);
        const color = isMajor ? majorGridColor : minorGridColor;
        const width = isMajor ? '0.8' : '0.3';
        createLine(x, view.y, x, view.y + view.h, color, width);
      }
      if (drawMinor) {
        const minorStartX = Math.ceil(view.x / minorStep) * minorStep;
        for (let x = minorStartX; x <= view.x + view.w; x += minorStep) {
          if (Math.abs(x % step) < 0.001) continue; // skip major positions
          createLine(x, view.y, x, view.y + view.h, minorGridColor, '0.3');
        }
      }

      // Horizontal lines
      const startY = Math.ceil(view.y / step) * step;
      for (let y = startY; y <= view.y + view.h; y += step) {
        const isMajor = (y % step === 0);
        const color = isMajor ? majorGridColor : minorGridColor;
        const width = isMajor ? '0.8' : '0.3';
        createLine(view.x, y, view.x + view.w, y, color, width);
      }
      if (drawMinor) {
        const minorStartY = Math.ceil(view.y / minorStep) * minorStep;
        for (let y = minorStartY; y <= view.y + view.h; y += minorStep) {
          if (Math.abs(y % step) < 0.001) continue;
          createLine(view.x, y, view.x + view.w, y, minorGridColor, '0.3');
        }
      }

      // Axes (through origin)
      createLine(view.x, 0, view.x + view.w, 0, axisColor, '2');
      createLine(0, view.y, 0, view.y + view.h, axisColor, '2');

      // Axis labels
      const labelFontSize = Math.max(0.8, Math.min(1.5, view.w / 20)); // dynamic font size
      const labelColor = dark ? '#e8e2d8' : '#222';

      function addText(x, y, text, anchor = 'middle') {
        const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        txt.setAttribute('x', x);
        txt.setAttribute('y', y);
        txt.setAttribute('font-size', labelFontSize);
        txt.setAttribute('font-family', 'Inter, sans-serif');
        txt.setAttribute('fill', labelColor);
        txt.setAttribute('text-anchor', anchor);
        txt.textContent = text;
        svg.appendChild(txt);
      }

      // X-axis labels
      const labelStep = step; // we only label major grid positions
      for (let x = startX; x <= view.x + view.w; x += labelStep) {
        if (Math.abs(x) < 0.001) continue; // origin handled separately
        addText(x, 0.2, x.toString(), 'middle');
      }

      // Y-axis labels
      for (let y = startY; y <= view.y + view.h; y += labelStep) {
        if (Math.abs(y) < 0.001) continue;
        addText(0.2, y + 0.1, y.toString(), 'start');
      }

      // Origin label
      addText(0.15, -0.2, '0', 'end');
    }

    // ── Panning ──
    let isPanning = false;
    let lastMouseX, lastMouseY;

    container.addEventListener('mousedown', (e) => {
      isPanning = true;
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;
      container.style.cursor = 'grabbing';
    });

    window.addEventListener('mousemove', (e) => {
      if (!isPanning) return;
      const dx = e.clientX - lastMouseX;
      const dy = e.clientY - lastMouseY;
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;

      const scaleX = view.w / container.clientWidth;
      const scaleY = view.h / container.clientHeight;

      view.x -= dx * scaleX;
      view.y -= dy * scaleY;
      applyView();
    });

    window.addEventListener('mouseup', () => {
      if (isPanning) {
        isPanning = false;
        container.style.cursor = 'default';
      }
    });

    // Touch pan
    container.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        isPanning = true;
        lastMouseX = e.touches[0].clientX;
        lastMouseY = e.touches[0].clientY;
        container.style.cursor = 'grabbing';
      }
    }, { passive: false });

    container.addEventListener('touchmove', (e) => {
      if (!isPanning || e.touches.length !== 1) return;
      e.preventDefault();
      const dx = e.touches[0].clientX - lastMouseX;
      const dy = e.touches[0].clientY - lastMouseY;
      lastMouseX = e.touches[0].clientX;
      lastMouseY = e.touches[0].clientY;

      const scaleX = view.w / container.clientWidth;
      const scaleY = view.h / container.clientHeight;
      view.x -= dx * scaleX;
      view.y -= dy * scaleY;
      applyView();
    }, { passive: false });

    container.addEventListener('touchend', () => {
      if (isPanning) {
        isPanning = false;
        container.style.cursor = 'default';
      }
    });

    // ── Zoom (wheel, cursor-centered) ──
    container.addEventListener('wheel', (e) => {
      e.preventDefault();
      const rect = container.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      // World coordinates under mouse
      const worldX = view.x + (mouseX / container.clientWidth) * view.w;
      const worldY = view.y + (mouseY / container.clientHeight) * view.h;

      // Zoom factor
      const zoomFactor = 1.1;
      let newW, newH;
      if (e.deltaY < 0) {
        // zoom in
        newW = view.w / zoomFactor;
        newH = view.h / zoomFactor;
      } else {
        // zoom out
        newW = view.w * zoomFactor;
        newH = view.h * zoomFactor;
      }

      // Don't allow too extreme zoom
      if (newW < 0.01 || newW > 10000 || newH < 0.01 || newH > 10000) return;

      // Adjust view origin so world point stays under mouse
      const newX = worldX - (mouseX / container.clientWidth) * newW;
      const newY = worldY - (mouseY / container.clientHeight) * newH;

      view.x = newX;
      view.y = newY;
      view.w = newW;
      view.h = newH;

      applyView();
    }, { passive: false });

    // ── Reset button ──
    resetBtn.addEventListener('click', () => {
      view = { ...defaultView };
      applyView();
    });

    // ── Theme change ──
    window.addEventListener('themechange', () => {
      drawContents();
    });

    // ── Resize handling ──
    const resizeObserver = new ResizeObserver(() => {
      // Keep the same view but redraw (labels may adjust)
      drawContents();
    });
    resizeObserver.observe(container);

    // ── Initial draw ──
    applyView();
  </script>
</body>
</html>
