<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prostopadłościan – objętość</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>

  :root {
    --bg: #f5f0e8; --bg2: #ebe5d9; --bg-card: #ffffff;
    --border: #e0d8cc; --text: #2c2c2c; --text-muted: #888; --text-sub: #777;
    --input-bg: #fdfcf9; --input-border: #c8c0b4; --hover-bg: #e4ddd1;
    --accent: #7a6a55; --divider: #d8d0c4;
    --shadow: 0 2px 10px rgba(0,0,0,0.05); --shadow-hover: 0 8px 24px rgba(0,0,0,0.10);
  }
  [data-theme="dark"] {
    --bg: #1c1b18; --bg2: #242320; --bg-card: #242320;
    --border: #38362f; --text: #e8e2d8; --text-muted: #6a6455; --text-sub: #8a8070;
    --input-bg: #2a2825; --input-border: #4a4840; --hover-bg: #2e2c28;
    --accent: #a08c70; --divider: #3a3830;
    --shadow: 0 2px 10px rgba(0,0,0,0.3); --shadow-hover: 0 8px 24px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    transition: background 0.2s, color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Topbar ── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 18px; background: var(--bg2); border-bottom: 1px solid var(--border);
    flex-shrink: 0; transition: background 0.2s, border-color 0.2s;
    min-height: 52px;
  }
  .topbar-title { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: 0.01em; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }

  .back-btn {
    font-size: 13px; font-weight: 600; color: var(--text-muted); text-decoration: none;
    padding: 7px 13px; border: 1.5px solid var(--input-border); border-radius: 8px;
    background: var(--input-bg); white-space: nowrap;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .back-btn:hover { background: var(--hover-bg); color: var(--text); }

  /* ── Dark mode toggle ── */
  .theme-toggle { display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; }
  .theme-toggle input[type="checkbox"] { display: none; }
  .toggle-track {
    width: 38px; height: 22px; background: var(--divider); border-radius: 11px;
    position: relative; transition: background 0.2s; flex-shrink: 0;
  }
  .theme-toggle input:checked + .toggle-track { background: var(--accent); }
  .toggle-thumb {
    width: 16px; height: 16px; background: white; border-radius: 50%;
    position: absolute; top: 3px; left: 3px; transition: transform 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
  }
  .theme-toggle input:checked + .toggle-track .toggle-thumb { transform: translateX(16px); }
  .toggle-icon { font-size: 14px; line-height: 1; }

  /* ── Bottom controls bar ── */
  .controls-bar {
    flex-shrink: 0;
    display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
    gap: 14px 20px; padding: 12px 16px 16px;
    background: var(--bg2); border-top: 1px solid var(--border);
    transition: background 0.2s, border-color 0.2s;
  }
  .control-group { display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; }
  .ctrl-label {
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.09em; white-space: nowrap;
    min-width: 56px;
  }
  .bar-divider { width: 1px; height: 28px; background: var(--divider); flex-shrink: 0; }

  /* ── Inputs ── */
  input[type="text"] {
    width: 56px; padding: 7px 8px;
    border: 1.5px solid var(--input-border); border-radius: 8px;
    font-size: 15px; font-weight: 600; font-family: 'Inter', sans-serif;
    text-align: center; background: var(--input-bg); color: var(--text);
    outline: none; transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="range"] {
    accent-color: var(--accent); cursor: pointer;
    width: 120px; height: 20px;
  }
  select {
    padding: 7px 10px; border: 1.5px solid var(--input-border); border-radius: 8px;
    font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif;
    background: var(--input-bg); color: var(--text);
    cursor: pointer; outline: none; transition: background 0.2s, color 0.2s;
  }
  input[type="color"] {
    width: 36px; height: 32px; border: 1.5px solid var(--input-border);
    border-radius: 8px; cursor: pointer; background: var(--input-bg); padding: 2px;
  }

  /* ── Cards ── */
  .card-grid { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
  .card {
    background: var(--bg-card); border: 1.5px solid var(--border); border-radius: 14px;
    padding: 28px 20px; text-align: center; text-decoration: none; color: var(--text);
    display: block; box-shadow: var(--shadow); width: 220px;
    transition: box-shadow 0.2s, transform 0.2s, background 0.2s, border-color 0.2s;
  }
  .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
  .card-icon { font-size: 40px; margin-bottom: 12px; }
  .card-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
  .card-desc { font-size: 13px; font-weight: 400; color: var(--text-sub); line-height: 1.5; }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    .topbar { padding: 11px 14px; }
    .topbar-title { font-size: 14px; }
    .back-btn { font-size: 12px; padding: 6px 10px; }
    .controls-bar { gap: 10px 14px; padding: 10px 12px 14px; }
    .ctrl-label { font-size: 10px; min-width: 48px; }
    input[type="text"] { width: 48px; font-size: 14px; padding: 6px; }
    input[type="range"] { width: 90px; }
    select { font-size: 13px; padding: 6px 8px; }
    .bar-divider { display: none; }
    .card { width: 160px; padding: 20px 14px; }
    .card-icon { font-size: 32px; margin-bottom: 8px; }
    .card-title { font-size: 14px; }
    .card-desc { font-size: 12px; }
  }
  @media (max-width: 380px) {
    .card { width: 140px; }
    input[type="range"] { width: 75px; }
  }

    body { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    .canvas-wrap { flex: 1; min-height: 0; position: relative; }
    .vol-display {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      z-index: 10; font-size: 36px; font-weight: 700; color: var(--text);
      letter-spacing: -0.02em; text-align: center; pointer-events: none;
      white-space: nowrap; text-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }
    .vol-sub { font-size: 14px; font-weight: 500; color: var(--text-muted); margin-left: 5px; }
    canvas { display: block; width: 100% !important; height: 100% !important; }
    @media (max-width: 600px) {
      .vol-display { font-size: 26px; top: 8px; }
      .vol-sub { font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="topbar-title">Prostopadłościan – objętość</span>
    <div class="topbar-right">
      <label class="theme-toggle" title="Tryb ciemny / jasny">
      <input type="checkbox" id="themeToggle">
      <span class="toggle-track"><span class="toggle-thumb"></span></span>
      <span class="toggle-icon">🌙</span>
    </label>
      <a href="../index.html" class="back-btn">← Powrót</a>
    </div>
  </div>
  <div class="canvas-wrap" id="canvasContainer">
    <div class="vol-display">Objętość: <span id="volVal">1</span><span class="vol-sub">jedn³</span></div>
  </div>
  <div class="controls-bar">
    <div class="control-group">
      <span class="ctrl-label">Szerokość</span>
      <input id="w" type="text" inputmode="decimal" value="1">
      <input id="ws" type="range" min="0" max="10" step="1" value="1">
    </div>
    <div class="bar-divider"></div>
    <div class="control-group">
      <span class="ctrl-label">Wysokość</span>
      <input id="h" type="text" inputmode="decimal" value="1">
      <input id="hs" type="range" min="0" max="10" step="1" value="1">
    </div>
    <div class="bar-divider"></div>
    <div class="control-group">
      <span class="ctrl-label">Głębokość</span>
      <input id="d" type="text" inputmode="decimal" value="1">
      <input id="ds" type="range" min="0" max="10" step="1" value="1">
    </div>
  </div>
  <script>
  (function() {
    const toggle = document.getElementById('themeToggle');
    const root = document.documentElement;
    if (localStorage.getItem('theme') === 'dark') {
      root.setAttribute('data-theme', 'dark');
      if (toggle) toggle.checked = true;
    }
    if (toggle) {
      toggle.addEventListener('change', () => {
        if (toggle.checked) {
          root.setAttribute('data-theme', 'dark');
          localStorage.setItem('theme', 'dark');
        } else {
          root.removeAttribute('data-theme');
          localStorage.setItem('theme', 'light');
        }
        window.dispatchEvent(new Event('themechange'));
      });
    }
  })();
</script>
  <script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/"}}</script>
  <script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

  const wI=document.getElementById('w'),hI=document.getElementById('h'),dI=document.getElementById('d');
  const wsS=document.getElementById('ws'),hsS=document.getElementById('hs'),dsS=document.getElementById('ds');
  const volVal=document.getElementById('volVal');
  const container=document.getElementById('canvasContainer');

  function isDark(){return document.documentElement.getAttribute('data-theme')==='dark';}
  function getBg(){return isDark()?'#1c1b18':'#f5f0e8';}
  function getEdge(){return isDark()?'#c0b8a8':'#111111';}
  function getGrid(){return isDark()?['#444440','#2e2c28']:['#bbbbbb','#dddddd'];}

  const scene=new THREE.Scene();
  scene.background=new THREE.Color(getBg());
  const camera=new THREE.PerspectiveCamera(45,container.clientWidth/container.clientHeight,0.1,100);
  camera.position.set(8,5,10); camera.lookAt(0,1,0);
  const renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(container.clientWidth,container.clientHeight);
  container.appendChild(renderer.domElement);
  const controls=new OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true; controls.dampingFactor=0.1; controls.target.set(0,1,0); controls.update();
  scene.add(new THREE.AmbientLight(0xffffff,0.6));
  const dl=new THREE.DirectionalLight(0xffffff,0.8); dl.position.set(5,10,7); scene.add(dl);

  let groundGrid=null;
  const boxMat=new THREE.MeshStandardMaterial({color:'#4a90d9',roughness:0.3,metalness:0.1,transparent:true,opacity:0.85,side:THREE.DoubleSide});
  const boxMesh=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),boxMat);
  scene.add(boxMesh);
  const sgg=new THREE.Group(),eg=new THREE.Group();
  scene.add(sgg); scene.add(eg);

  const LT=0.022;
  function mkLine(x1,y1,z1,x2,y2,z2,c){const dx=x2-x1,dy=y2-y1,dz=z2-z1,len=Math.sqrt(dx*dx+dy*dy+dz*dz);let geo;if(Math.abs(dy)>0.001)geo=new THREE.BoxGeometry(LT,len,LT);else if(Math.abs(dx)>0.001)geo=new THREE.BoxGeometry(len,LT,LT);else geo=new THREE.BoxGeometry(LT,LT,len);const m=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color:c}));m.position.set((x1+x2)/2,(y1+y2)/2,(z1+z2)/2);return m;}
  function mkCorner(x,y,z,c){const m=new THREE.Mesh(new THREE.BoxGeometry(LT,LT,LT),new THREE.MeshBasicMaterial({color:c}));m.position.set(x,y,z);return m;}

  const HO=0.24;
  let lW=1,lH=1,lD=1;

  function updateGrid(md){
    if(groundGrid)scene.remove(groundGrid);
    const sz=Math.max(md,4)+2,[gc,gs]=getGrid();
    groundGrid=new THREE.GridHelper(sz,Math.ceil(sz),gc,gs);
    groundGrid.position.y=0; scene.add(groundGrid);
  }
  function updateSurface(w,h,d){
    while(sgg.children.length)sgg.remove(sgg.children[0]);
    while(eg.children.length)eg.remove(eg.children[0]);
    if(w<=0||h<=0||d<=0)return;
    const ec=getEdge(),hw=w/2,hd=d/2,ty=HO+h,by=HO;
    function gp(t,ho){const p=[];for(let i=0;i<=Math.floor(t);i++)p.push(i-ho);if(!p.includes(ho))p.push(ho);if(!p.includes(-ho))p.push(-ho);return p;}
    const xp=gp(w,hw),zp=gp(d,hd),yp=[];
    for(let i=0;i<=Math.floor(h);i++)yp.push(by+i);
    if(!yp.includes(ty))yp.push(ty);if(!yp.includes(by))yp.push(by);
    function al(x1,y1,z1,x2,y2,z2){sgg.add(mkLine(x1,y1,z1,x2,y2,z2,ec));}
    for(const x of xp){al(x,by,hd,x,ty,hd);al(x,by,-hd,x,ty,-hd);}
    for(const y of yp){al(-hw,y,hd,hw,y,hd);al(-hw,y,-hd,hw,y,-hd);}
    for(const z of zp){al(hw,by,z,hw,ty,z);al(-hw,by,z,-hw,ty,z);}
    for(const y of yp){al(hw,y,-hd,hw,y,hd);al(-hw,y,-hd,-hw,y,hd);}
    for(const x of xp){al(x,ty,-hd,x,ty,hd);al(x,by,-hd,x,by,hd);}
    for(const z of zp){al(-hw,ty,z,hw,ty,z);al(-hw,by,z,hw,by,z);}
    const corners=[[-hw,by,-hd],[hw,by,-hd],[hw,by,hd],[-hw,by,hd],[-hw,ty,-hd],[hw,ty,-hd],[hw,ty,hd],[-hw,ty,hd]];
    const edges=[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
    for(const[i,j]of edges){const p=corners[i],q=corners[j];eg.add(mkLine(p[0],p[1],p[2],q[0],q[1],q[2],ec));}
    for(const[cx,cy,cz]of corners)eg.add(mkCorner(cx,cy,cz,ec));
  }
  function updatePrism(){
    boxMesh.scale.set(lW,lH,lD); boxMesh.position.set(0,HO+lH/2,0);
    boxMesh.visible=(lW>0&&lH>0&&lD>0);
    volVal.textContent=parseFloat((lW*lH*lD).toFixed(2));
    updateSurface(lW,lH,lD); updateGrid(Math.max(lW,lD));
  }
  function applyTheme(){scene.background=new THREE.Color(getBg());updatePrism();}
  window.addEventListener('themechange',applyTheme);

  function onSlider(){lW=parseFloat(wsS.value);lH=parseFloat(hsS.value);lD=parseFloat(dsS.value);wI.value=lW;hI.value=lH;dI.value=lD;updatePrism();}
  wsS.addEventListener('input',onSlider); hsS.addEventListener('input',onSlider); dsS.addEventListener('input',onSlider);
  function bindText(inp,sl,getV,setV){inp.addEventListener('change',()=>{const v=parseFloat(inp.value);if(!isNaN(v)){setV(Math.max(0,Math.min(10,v)));sl.value=getV();inp.value=getV();updatePrism();}else inp.value=getV();});}
  bindText(wI,wsS,()=>lW,v=>{lW=v;}); bindText(hI,hsS,()=>lH,v=>{lH=v;}); bindText(dI,dsS,()=>lD,v=>{lD=v;});

  const ro=new ResizeObserver(()=>{camera.aspect=container.clientWidth/container.clientHeight;camera.updateProjectionMatrix();renderer.setSize(container.clientWidth,container.clientHeight);});
  ro.observe(container);

  function animate(){requestAnimationFrame(animate);controls.update();renderer.render(scene,camera);}
  updatePrism(); animate();
  </script>
</body>
