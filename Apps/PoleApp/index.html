<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pole figury</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script>
  if (localStorage.getItem('theme') !== 'light') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
</script>
  <link rel="stylesheet" href="../../shared/common.css">
  <style>
    body { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    .canvas-wrap {
      flex: 1; min-height: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: clamp(4px, 1vh, 8px);
      padding: clamp(6px, 2vw, 10px); overflow: hidden;
    }
    .area-display { flex-shrink: 0; font-size: clamp(28px, 8vw, 42px); font-weight: 700; color: var(--text); letter-spacing: -0.02em; text-align: center; line-height: 1.1; }
    .area-sub { font-size: clamp(13px, 3.5vw, 15px); font-weight: 500; color: var(--text-muted); margin-left: 6px; }
    .area-formula {
      flex-shrink: 0; text-align: center; font-size: clamp(16px, 4vw, 22px);
      color: var(--text); margin-top: 2px;
    }
    .area-formula .katex { font-size: inherit; }
    .svg-container {
      flex: 1; min-height: 0; width: 100%; position: relative;
      overflow: hidden;                     /* no scrollbars */
      touch-action: manipulation;           /* disable browser gestures */
      cursor: crosshair;
    }
    svg {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    /* ── Custom shape picker ── */
    .shape-picker {
      position: relative;
      display: inline-block;
      user-select: none;
    }
    .shape-picker-btn {
      display: flex; align-items: center; gap: 8px;
      padding: clamp(8px, 2vw, 10px) clamp(12px, 3vw, 16px);
      border: 1.5px solid var(--input-border);
      border-radius: 10px;
      background: var(--input-bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: clamp(14px, 3.5vw, 16px);
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
    }
    .shape-picker-btn:hover { background: var(--hover-bg); }
    .shape-picker-btn img {
      width: clamp(24px, 5vw, 28px);
      height: clamp(24px, 5vw, 28px);
      object-fit: contain;
      flex-shrink: 0;
    }
    .shape-options {
      position: absolute;
      bottom: calc(100% + 6px);   /* opens upward */
      left: 0;
      z-index: 20;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 -4px 16px rgba(0,0,0,0.15);
      min-width: 100%;
      overflow: hidden;
      display: none;
    }
    .shape-options.open { display: block; }
    .shape-option {
      display: flex; align-items: center; gap: 8px;
      padding: clamp(8px, 2vw, 10px) clamp(12px, 3vw, 16px);
      cursor: pointer;
      font-size: clamp(13px, 3.5vw, 15px);
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      transition: background 0.1s;
    }
    .shape-option:hover { background: var(--hover-bg); }
    .shape-option img {
      width: clamp(22px, 4vw, 26px);
      height: clamp(22px, 4vw, 26px);
      object-fit: contain;
      flex-shrink: 0;
    }
    .shape-option.active { font-weight: 700; color: var(--accent); }

    @media (max-width: 600px) {
      .area-display { font-size: clamp(24px, 7vw, 32px); }
      .area-sub { font-size: clamp(11px, 3vw, 13px); }
      .area-formula { font-size: clamp(14px, 3.5vw, 18px); }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="topbar-title">Pole figury</span>
    <div class="topbar-right">
      <label class="theme-toggle" title="Tryb ciemny / jasny">
      <input type="checkbox" id="themeToggle">
      <span class="toggle-track"><span class="toggle-thumb"></span></span>
      <span class="toggle-icon">🌙</span>
    </label>
      <a href="../index.html" class="back-btn">← Powrót</a>
    </div>
  </div>
  <div class="canvas-wrap">
    <div class="area-display">Pole: <span id="areaVal">15</span><span class="area-sub">jedn²</span></div>
    <div class="area-formula" id="areaFormula"></div>
    <div class="svg-container" id="svgContainer">
      <svg id="svg"></svg>
    </div>
  </div>
  <div class="controls-bar">
    <div class="control-group">
      <span class="ctrl-label" id="widthLabel">Długość</span>
      <input id="w" type="text" inputmode="decimal" value="5">
      <input id="ws" type="range" min="0" max="20" step="1" value="5">
    </div>
    <div class="bar-divider"></div>
    <div class="control-group" id="heightGroup">
      <span class="ctrl-label" id="heightLabel">Wysokość</span>
      <input id="h" type="text" inputmode="decimal" value="3">
      <input id="hs" type="range" min="0" max="20" step="1" value="3">
    </div>
    <div class="bar-divider"></div>
    <div class="control-group" id="base2Group" style="display: none;">
      <span class="ctrl-label">Podstawa 2</span>
      <input id="b2" type="text" inputmode="decimal" value="4">
      <input id="b2s" type="range" min="0" max="20" step="1" value="4">
    </div>
    <div class="bar-divider"></div>
    <div class="control-group">
      <span class="ctrl-label">Kształt</span>
      <!-- Hidden native select -->
      <select id="shapeSelect" style="display:none;">
        <option value="rectangle" selected>Prostokąt</option>
        <option value="rightTriangle">Trójkąt prostokątny</option>
        <option value="equilateral">Trójkąt równoboczny</option>
        <option value="triangle">Trójkąt równoramienny</option>
        <option value="parallelogram">Równoległobok</option>
        <option value="rhombus">Romb</option>
        <option value="trapezoid">Trapez</option>
      </select>

      <!-- Custom visual picker -->
      <div class="shape-picker" id="shapePicker">
        <div class="shape-picker-btn" id="shapePickerBtn">
          <img id="shapePickerIcon" src="img/shapes/rectangle.png" alt="" onerror="this.style.display='none'">
          <span id="shapePickerLabel">Prostokąt</span>
        </div>
        <div class="shape-options" id="shapeOptions">
          <!-- Options generated by JS -->
        </div>
      </div>
    </div>
    <div class="control-group">
      <span class="ctrl-label">Kolor</span>
      <input id="colorPicker" type="color" value="#4a90d9">
    </div>
    <div class="bar-divider"></div>
    <div class="control-group">
      <span class="ctrl-label">Siatka</span>
      <input type="checkbox" id="gridCheckbox" checked>
    </div>
  </div>
  <script src="../../shared/theme.js"></script>
  <script>
  const UNIT = 40;
  const PADDING = 2 * UNIT;

  const w = document.getElementById('w'), h = document.getElementById('h'), b2 = document.getElementById('b2');
  const ws = document.getElementById('ws'), hs = document.getElementById('hs'), b2s = document.getElementById('b2s');
  const shapeSelect = document.getElementById('shapeSelect'), colorPicker = document.getElementById('colorPicker');
  const areaVal = document.getElementById('areaVal'), svg = document.getElementById('svg'), svgContainer = document.getElementById('svgContainer');
  const gridCheckbox = document.getElementById('gridCheckbox');
  const widthLabel = document.getElementById('widthLabel');
  const heightGroup = document.getElementById('heightGroup');
  const heightLabel = document.getElementById('heightLabel');
  const base2Group = document.getElementById('base2Group');
  const areaFormula = document.getElementById('areaFormula');

  // ── Shape picker elements ──
  const shapePickerBtn = document.getElementById('shapePickerBtn');
  const shapePickerIcon = document.getElementById('shapePickerIcon');
  const shapePickerLabel = document.getElementById('shapePickerLabel');
  const shapeOptions = document.getElementById('shapeOptions');

  const shapesInfo = {
    rectangle:       { name: 'Prostokąt',            icon: 'img/shapes/rectangle.png' },
    rightTriangle:   { name: 'Trójkąt prostokątny',  icon: 'img/shapes/rightTriangle.png' },
    equilateral:     { name: 'Trójkąt równoboczny',  icon: 'img/shapes/equilateral.png' },
    triangle:        { name: 'Trójkąt równoramienny',icon: 'img/shapes/triangle.png' },
    parallelogram:   { name: 'Równoległobok',        icon: 'img/shapes/parallelogram.png' },
    rhombus:         { name: 'Romb',                 icon: 'img/shapes/rhombus.png' },
    trapezoid:       { name: 'Trapez',               icon: 'img/shapes/trapezoid.png' }
  };

  function buildShapeOptions() {
    shapeOptions.innerHTML = '';
    for (const [value, info] of Object.entries(shapesInfo)) {
      const div = document.createElement('div');
      div.className = 'shape-option';
      div.dataset.value = value;
      div.innerHTML = `<img src="${info.icon}" alt="" onerror="this.style.display='none'"><span>${info.name}</span>`;
      div.addEventListener('click', () => {
        selectShape(value);
        closeShapePicker();
      });
      shapeOptions.appendChild(div);
    }
  }
  buildShapeOptions();

  function updateShapePickerButton() {
    const val = shapeSelect.value;
    const info = shapesInfo[val];
    shapePickerLabel.textContent = info.name;
    shapePickerIcon.src = info.icon;
    shapePickerIcon.style.display = '';
    document.querySelectorAll('.shape-option').forEach(opt => {
      opt.classList.toggle('active', opt.dataset.value === val);
    });
  }

  function openShapePicker() { shapeOptions.classList.add('open'); }
  function closeShapePicker() { shapeOptions.classList.remove('open'); }
  shapePickerBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    shapeOptions.classList.contains('open') ? closeShapePicker() : openShapePicker();
  });
  document.addEventListener('click', (e) => {
    if (!document.getElementById('shapePicker').contains(e.target)) closeShapePicker();
  });

  function selectShape(value) {
    shapeSelect.value = value;
    updateShapePickerButton();
    updateUIForShape();
    draw();
  }
  shapeSelect.addEventListener('change', () => {
    updateShapePickerButton();
    updateUIForShape();
    draw();
  });

  // ── Math utilities ──
  function num(v) { return Math.max(0, Math.min(20, parseFloat(v) || 0)); }
  function fmt(n) { return parseFloat(n.toFixed(4)).toString(); }
  function hexToRgba(hex, alpha) {
    hex = hex.replace('#', '');
    const r = parseInt(hex.substring(0,2),16), g = parseInt(hex.substring(2,4),16), b = parseInt(hex.substring(4,6),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }
  function isDark() { return document.documentElement.getAttribute('data-theme') === 'dark'; }

  // ── View state ──
  let viewW = 0, viewH = 0;      // natural SVG size (viewBox)
  let zoom = 1;                  // current zoom level (1 = fit exactly)
  let focusX = 0, focusY = 0;    // world point (in viewBox coords) we want to keep fixed, initially center
  let panX = 0, panY = 0;        // offset of SVG from container center (in screen pixels)

  // Re-apply the SVG element's size and position
  function updateSVGPosition() {
    if (!viewW || !viewH) return;
    const cW = svgContainer.clientWidth;
    const cH = svgContainer.clientHeight;
    if (cW <= 0 || cH <= 0) return;

    // maximum zoom to fit exactly (without clipping)
    const maxZoom = Math.min(cW / viewW, cH / viewH);
    zoom = Math.max(0.5, Math.min(maxZoom, zoom));   // clamp to allowed range

    // SVG pixel size
    const wPx = viewW * zoom;
    const hPx = viewH * zoom;
    svg.setAttribute('width', wPx);
    svg.setAttribute('height', hPx);

    // Desired position: we want the point (focusX, focusY) in world coordinates
    // to appear at the same screen position as before (the mouse position when wheel fired).
    // Here we just center the SVG and then shift by panX, panY.
    // panX, panY will be updated by the wheel event to keep the focus point steady.
    svg.style.left = `calc(50% + ${panX}px)`;
    svg.style.top = `calc(50% + ${panY}px)`;
    svg.style.transform = 'translate(-50%, -50%)';
  }

  // Set initial pan to center the shape
  function resetPan() {
    panX = 0;
    panY = 0;
  }

  // Wheel zoom toward cursor
  svgContainer.addEventListener('wheel', (e) => {
    e.preventDefault();
    if (!viewW || !viewH) return;

    const rect = svgContainer.getBoundingClientRect();
    const mouseScreenX = e.clientX - rect.left;
    const mouseScreenY = e.clientY - rect.top;

    const cW = svgContainer.clientWidth;
    const cH = svgContainer.clientHeight;
    if (cW <= 0 || cH <= 0) return;

    // Current SVG pixel size and position
    const curW = viewW * zoom;
    const curH = viewH * zoom;

    // The SVG is centered with top/left 50% and translated -50%,
    // then shifted by panX, panY.
    // The top-left corner of the SVG in container coordinates is:
    const svgLeft = (cW - curW) / 2 + panX;
    const svgTop = (cH - curH) / 2 + panY;

    // World coordinates under mouse
    const worldX = ((mouseScreenX - svgLeft) / curW) * viewW;
    const worldY = ((mouseScreenY - svgTop) / curH) * viewH;

    // Change zoom
    let newZoom = zoom + (e.deltaY > 0 ? -0.1 : 0.1);
    const maxZoom = Math.min(cW / viewW, cH / viewH);
    newZoom = Math.max(0.5, Math.min(maxZoom, newZoom));
    if (newZoom === zoom) return;   // nothing changed

    // New SVG pixel size
    const newW = viewW * newZoom;
    const newH = viewH * newZoom;

    // Compute new pan so that (worldX, worldY) stays under mouse
    // We want: mouseScreenX = svgLeft_new + (worldX / viewW) * newW
    // where svgLeft_new = (cW - newW)/2 + panX_new
    // So panX_new = mouseScreenX - (cW - newW)/2 - (worldX / viewW) * newW
    const newPanX = mouseScreenX - (cW - newW) / 2 - (worldX / viewW) * newW;
    const newPanY = mouseScreenY - (cH - newH) / 2 - (worldY / viewH) * newH;

    zoom = newZoom;
    panX = newPanX;
    panY = newPanY;
    updateSVGPosition();
  }, { passive: false });

  // Keep zoom within bounds when container resizes
  new ResizeObserver(() => {
    if (viewW && viewH) {
      const maxZoom = Math.min(svgContainer.clientWidth / viewW, svgContainer.clientHeight / viewH);
      if (zoom > maxZoom) zoom = maxZoom;
      updateSVGPosition();
    }
  }).observe(svgContainer);

  // ── Drawing ──
  function draw() {
    const shape = shapeSelect.value;
    let width = num(w.value);
    let height = num(h.value);
    let base2Val = num(b2.value);

    if (shape === 'equilateral') {
      height = width * Math.sqrt(3) / 2;
    }

    const fill = hexToRgba(colorPicker.value, 0.35);
    const dark = isDark(),
          gs = dark ? '#555' : '#666',
          ss = dark ? '#ccc' : 'black';

    let area;
    let formulaSym, formulaSub, latexString;

    if (shape === 'rectangle') {
      area = width * height;
      formulaSym = 'P = a \\cdot b';
      formulaSub = `${width} \\cdot ${height} = ${fmt(area)}`;
    } else if (shape === 'rightTriangle') {
      area = (width * height) / 2;
      formulaSym = 'P = \\frac{a \\cdot b}{2}';
      formulaSub = `\\frac{${width} \\cdot ${height}}{2} = ${fmt(area)}`;
    } else if (shape === 'equilateral') {
      area = (Math.sqrt(3) / 4) * width * width;
      formulaSym = 'P = \\frac{\\sqrt{3}}{4} a^2';
      formulaSub = `\\frac{\\sqrt{3}}{4} \\cdot ${width}^2 = ${fmt(area)}`;
    } else if (shape === 'triangle') {
      area = (width * height) / 2;
      formulaSym = 'P = \\frac{a \\cdot h}{2}';
      formulaSub = `\\frac{${width} \\cdot ${height}}{2} = ${fmt(area)}`;
    } else if (shape === 'parallelogram' || shape === 'rhombus') {
      area = width * height;
      formulaSym = 'P = a \\cdot h';
      formulaSub = `${width} \\cdot ${height} = ${fmt(area)}`;
    } else if (shape === 'trapezoid') {
      area = ((width + base2Val) * height) / 2;
      formulaSym = 'P = \\frac{(a + b) \\cdot h}{2}';
      formulaSub = `\\frac{(${width} + ${base2Val}) \\cdot ${height}}{2} = ${fmt(area)}`;
    }

    latexString = `${formulaSym} = ${formulaSub}\\ \\text{jedn}^2`;
    areaVal.textContent = fmt(area);
    katex.render(latexString, areaFormula, { throwOnError: false });

    // vertices (same as before)
    let vertices = [];
    const uW = width, uH = height;
    if (shape === 'rectangle') {
      vertices = [[0, 0], [uW, 0], [uW, uH], [0, uH]];
    } else if (shape === 'rightTriangle') {
      vertices = [[0, 0], [0, uH], [uW, uH]];
    } else if (shape === 'equilateral' || shape === 'triangle') {
      vertices = [[uW/2, 0], [0, uH], [uW, uH]];
    } else if (shape === 'parallelogram') {
      const offset = uW * 0.3;
      vertices = [[0, uH], [uW, uH], [uW + offset, 0], [offset, 0]];
    } else if (shape === 'rhombus') {
      const offset = (uH < uW) ? Math.sqrt(uW*uW - uH*uH) : 0;
      vertices = [[0, uH], [uW, uH], [uW + offset, 0], [offset, 0]];
    } else if (shape === 'trapezoid') {
      const topBase = base2Val;
      const bottomLeft = 0, bottomRight = uW;
      const topLeft = (uW - topBase) / 2;
      const topRight = topLeft + topBase;
      vertices = [[bottomLeft, uH], [bottomRight, uH], [topRight, 0], [topLeft, 0]];
    }

    // bounding box
    let minUX = Infinity, maxUX = -Infinity, minUY = Infinity, maxUY = -Infinity;
    for (const [ux, uy] of vertices) {
      if (ux < minUX) minUX = ux;
      if (ux > maxUX) maxUX = ux;
      if (uy < minUY) minUY = uy;
      if (uy > maxUY) maxUY = uy;
    }

    const totalW = (maxUX - minUX) * UNIT + 2 * PADDING;
    const totalH = (maxUY - minUY) * UNIT + 2 * PADDING;
    viewW = totalW;
    viewH = totalH;

    svg.setAttribute('viewBox', `0 0 ${viewW} ${viewH}`);

    function toScreen(ux, uy) {
      return {
        x: PADDING + (ux - minUX) * UNIT,
        y: PADDING + (uy - minUY) * UNIT
      };
    }

    let s = '';
    if (gridCheckbox.checked) {
      const cols = Math.ceil(maxUX - minUX);
      const rows = Math.ceil(maxUY - minUY);
      for (let i = 0; i <= cols; i++) {
        const x = PADDING + i * UNIT;
        s += `<line x1="${x}" y1="${PADDING}" x2="${x}" y2="${PADDING + rows * UNIT}" stroke="${gs}" stroke-width="0.5"/>`;
      }
      for (let j = 0; j <= rows; j++) {
        const y = PADDING + j * UNIT;
        s += `<line x1="${PADDING}" y1="${y}" x2="${PADDING + cols * UNIT}" y2="${y}" stroke="${gs}" stroke-width="0.5"/>`;
      }
    }

    let ptsStr = vertices.map(([ux, uy]) => {
      const p = toScreen(ux, uy);
      return `${p.x},${p.y}`;
    }).join(' ');
    s += `<polygon points="${ptsStr}" fill="${fill}" stroke="${ss}" stroke-width="2"/>`;

    if (shape === 'rectangle') {
      const cols = Math.ceil(uW);
      const rows = Math.ceil(uH);
      const base = toScreen(0, 0);
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const vw = Math.max(0, Math.min(1, uW - x));
          const vh = Math.max(0, Math.min(1, uH - y));
          if (vw > 0 && vh > 0) {
            const rx = base.x + x * UNIT;
            const ry = base.y + y * UNIT;
            s += `<rect x="${rx}" y="${ry}" width="${vw * UNIT}" height="${vh * UNIT}" fill="${fill}"/>`;
          }
        }
      }
    }

    svg.innerHTML = s;

    // Reset view to fully fit
    const cW = svgContainer.clientWidth;
    const cH = svgContainer.clientHeight;
    if (cW > 0 && cH > 0 && viewW > 0 && viewH > 0) {
      zoom = Math.min(cW / viewW, cH / viewH);
      // start with shape centered
      panX = 0; panY = 0;
      updateSVGPosition();
    }
  }

  // ── Rhombus height clamping ──
  function clampRhombusHeight() {
    if (shapeSelect.value !== 'rhombus') return;
    const side = num(w.value);
    let curHeight = num(h.value);
    if (curHeight > side) {
      curHeight = side;
      h.value = curHeight;
      hs.value = curHeight;
    }
    hs.max = side;
    h.setAttribute('max', side);
  }

  function updateUIForShape() {
    const shape = shapeSelect.value;
    heightGroup.style.display = '';
    base2Group.style.display = 'none';
    widthLabel.textContent = 'Długość';
    heightLabel.textContent = 'Wysokość';

    hs.max = 20;
    h.removeAttribute('max');

    if (shape === 'equilateral') {
      heightGroup.style.display = 'none';
      widthLabel.textContent = 'Bok';
    } else if (shape === 'rectangle') {
      widthLabel.textContent = 'Długość';
      heightLabel.textContent = 'Szerokość';
    } else if (shape === 'rightTriangle' || shape === 'triangle') {
      widthLabel.textContent = 'Podstawa';
      heightLabel.textContent = 'Wysokość';
    } else if (shape === 'parallelogram' || shape === 'rhombus') {
      if (shape === 'rhombus') widthLabel.textContent = 'Bok';
      else widthLabel.textContent = 'Podstawa';
      heightLabel.textContent = 'Wysokość';
      if (shape === 'rhombus') clampRhombusHeight();
    } else if (shape === 'trapezoid') {
      widthLabel.textContent = 'Podstawa 1';
      heightLabel.textContent = 'Wysokość';
      base2Group.style.display = '';
    }
  }

  // ── Event listeners ──
  w.oninput = () => { if (shapeSelect.value === 'rhombus') clampRhombusHeight(); draw(); };
  h.oninput = () => {
    if (shapeSelect.value === 'rhombus') {
      const side = num(w.value);
      let cur = num(h.value);
      if (cur > side) { cur = side; h.value = cur; hs.value = cur; }
    }
    draw();
  };
  b2.oninput = draw;

  ws.oninput = () => { w.value = ws.value; if (shapeSelect.value === 'rhombus') clampRhombusHeight(); draw(); };
  hs.oninput = () => {
    let val = parseFloat(hs.value);
    if (shapeSelect.value === 'rhombus') {
      const side = num(w.value);
      if (val > side) val = side;
      hs.value = val;
    }
    h.value = val;
    draw();
  };
  b2s.oninput = () => { b2.value = b2s.value; draw(); };

  colorPicker.oninput = draw;
  gridCheckbox.addEventListener('change', draw);
  window.addEventListener('themechange', draw);

  w.addEventListener('change', () => { let v = num(w.value); w.value = v; ws.value = v; if (shapeSelect.value === 'rhombus') clampRhombusHeight(); draw(); });
  h.addEventListener('change', () => {
    let v = num(h.value);
    if (shapeSelect.value === 'rhombus') { const side = num(w.value); if (v > side) v = side; }
    h.value = v; hs.value = v; draw();
  });
  b2.addEventListener('change', () => { const v = num(b2.value); b2.value = v; b2s.value = v; draw(); });

  // Initial setup
  updateShapePickerButton();
  updateUIForShape();
  draw();
  </script>
</body>
</html>
