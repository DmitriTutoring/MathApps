<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Korepetycje – materiały</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>

  :root {
    --bg: #f5f0e8; --bg2: #ebe5d9; --bg-card: #ffffff;
    --border: #e0d8cc; --text: #2c2c2c; --text-muted: #888; --text-sub: #777;
    --input-bg: #fdfcf9; --input-border: #c8c0b4; --hover-bg: #e4ddd1;
    --accent: #7a6a55; --divider: #d8d0c4;
    --shadow: 0 2px 10px rgba(0,0,0,0.05); --shadow-hover: 0 8px 24px rgba(0,0,0,0.10);
  }
  [data-theme="dark"] {
    --bg: #1c1b18; --bg2: #242320; --bg-card: #242320;
    --border: #38362f; --text: #e8e2d8; --text-muted: #6a6455; --text-sub: #8a8070;
    --input-bg: #2a2825; --input-border: #4a4840; --hover-bg: #2e2c28;
    --accent: #a08c70; --divider: #3a3830;
    --shadow: 0 2px 10px rgba(0,0,0,0.3); --shadow-hover: 0 8px 24px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    transition: background 0.2s, color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Topbar ── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; background: var(--bg2); border-bottom: 1px solid var(--border);
    flex-shrink: 0; transition: background 0.2s, border-color 0.2s; min-height: 54px;
  }
  .topbar-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .back-btn {
    font-size: 14px; font-weight: 600; color: var(--text-muted); text-decoration: none;
    padding: 8px 14px; border: 1.5px solid var(--input-border); border-radius: 8px;
    background: var(--input-bg); white-space: nowrap;
    transition: background 0.15s, color 0.15s;
  }
  .back-btn:hover { background: var(--hover-bg); color: var(--text); }

  /* ── Dark toggle ── */
  .theme-toggle { display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; }
  .theme-toggle input[type="checkbox"] { display: none; }
  .toggle-track {
    width: 42px; height: 24px; background: var(--divider); border-radius: 12px;
    position: relative; transition: background 0.2s; flex-shrink: 0;
  }
  .theme-toggle input:checked + .toggle-track { background: var(--accent); }
  .toggle-thumb {
    width: 18px; height: 18px; background: white; border-radius: 50%;
    position: absolute; top: 3px; left: 3px; transition: transform 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
  }
  .theme-toggle input:checked + .toggle-track .toggle-thumb { transform: translateX(18px); }
  .toggle-icon { font-size: 15px; line-height: 1; }

  /* ── Controls bar (desktop) ── */
  .controls-bar {
    flex-shrink: 0; display: flex; flex-wrap: wrap;
    align-items: center; justify-content: center;
    gap: 14px 22px; padding: 12px 18px 16px;
    background: var(--bg2); border-top: 1px solid var(--border);
    transition: background 0.2s, border-color 0.2s;
  }
  .control-group { display: flex; align-items: center; gap: 9px; }
  .ctrl-label {
    font-size: 12px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; min-width: 60px;
  }
  .bar-divider { width: 1px; height: 28px; background: var(--divider); flex-shrink: 0; }

  /* ── Form elements (desktop) ── */
  input[type="text"] {
    width: 58px; padding: 7px 8px;
    border: 1.5px solid var(--input-border); border-radius: 8px;
    font-size: 15px; font-weight: 600; font-family: 'Inter', sans-serif;
    text-align: center; background: var(--input-bg); color: var(--text);
    outline: none; transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="range"] { accent-color: var(--accent); cursor: pointer; width: 130px; height: 22px; }
  select {
    padding: 7px 10px; border: 1.5px solid var(--input-border); border-radius: 8px;
    font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif;
    background: var(--input-bg); color: var(--text); cursor: pointer; outline: none;
    transition: background 0.2s, color 0.2s;
  }
  input[type="color"] {
    width: 38px; height: 34px; border: 1.5px solid var(--input-border);
    border-radius: 8px; cursor: pointer; background: var(--input-bg); padding: 2px;
  }

  /* ── Cards ── */
  .card-grid { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
  .card {
    background: var(--bg-card); border: 1.5px solid var(--border); border-radius: 14px;
    padding: 28px 20px; text-align: center; text-decoration: none; color: var(--text);
    display: block; box-shadow: var(--shadow); width: 220px;
    transition: box-shadow 0.2s, transform 0.2s, background 0.2s, border-color 0.2s;
  }
  .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
  .card-icon { font-size: 40px; margin-bottom: 12px; }
  .card-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .card-desc { font-size: 13px; color: var(--text-sub); line-height: 1.5; }

  /* ════════════════════════════════
     MOBILE  (≤ 600px)
     ════════════════════════════════ */
  @media (max-width: 600px) {

    /* Topbar */
    .topbar { padding: 12px 14px; min-height: 52px; }
    .topbar-title { font-size: 14px; }
    .back-btn { font-size: 13px; padding: 7px 12px; }
    .toggle-track { width: 38px; height: 22px; }
    .toggle-thumb { width: 16px; height: 16px; }
    .theme-toggle input:checked + .toggle-track .toggle-thumb { transform: translateX(16px); }

    /* Controls: stack each group as its own full-width row */
    .controls-bar {
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
      padding: 12px 14px 16px;
    }
    .bar-divider { display: none; }
    .control-group {
      width: 100%;
      justify-content: space-between;
    }
    .ctrl-label {
      font-size: 13px;
      min-width: 80px;
      flex-shrink: 0;
    }
    input[type="text"] {
      width: 60px;
      font-size: 16px;
      padding: 8px;
      flex-shrink: 0;
    }
    input[type="range"] {
      flex: 1;
      width: auto;
      height: 28px;
    }
    select {
      flex: 1;
      font-size: 15px;
      padding: 8px 10px;
    }
    input[type="color"] {
      width: 44px; height: 38px; flex-shrink: 0;
    }

    /* Cards: single column, full width */
    .card-grid { flex-direction: column; align-items: stretch; gap: 12px; width: 100%; }
    .card {
      width: 100%; padding: 20px 18px;
      display: flex; align-items: center; gap: 16px; text-align: left;
    }
    .card-icon { font-size: 36px; margin-bottom: 0; flex-shrink: 0; }
    .card-title { font-size: 16px; margin-bottom: 3px; }
    .card-desc { font-size: 13px; }
  }

    body { min-height: 100dvh; display: flex; flex-direction: column; }
    .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px; gap: 28px; }
    .page-title { font-size: 24px; font-weight: 700; text-align: center; }
    .footer { text-align: center; font-size: 12px; color: var(--text-muted); padding: 16px; }
    @media (max-width: 600px) {
      .main { padding: 24px 16px; gap: 20px; justify-content: flex-start; padding-top: 32px; }
      .page-title { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="topbar-title">Korepetycje</span>
    <label class="theme-toggle" title="Tryb ciemny / jasny">
      <input type="checkbox" id="themeToggle">
      <span class="toggle-track"><span class="toggle-thumb"></span></span>
      <span class="toggle-icon">🌙</span>
    </label>
  </div>
  <div class="main">
    <h1 class="page-title">Materiały korepetytorskie</h1>
    <div class="card-grid">
      <a href="Books/index.html" class="card">
        <div class="card-icon">📚</div>
        <div><div class="card-title">Podręczniki</div><div class="card-desc">Linki do darmowych podręczników i materiałów online.</div></div>
      </a>
      <a href="Apps/index.html" class="card">
        <div class="card-icon">🧮</div>
        <div><div class="card-title">Aplikacje</div><div class="card-desc">Interaktywne wizualizacje matematyczne.</div></div>
      </a>
    </div>
  </div>
  <div class="footer">Twoje narzędzia korepetytorskie</div>
  <script>
  (function() {
    const toggle = document.getElementById('themeToggle');
    const root = document.documentElement;
    if (localStorage.getItem('theme') === 'dark') {
      root.setAttribute('data-theme', 'dark');
      if (toggle) toggle.checked = true;
    }
    if (toggle) {
      toggle.addEventListener('change', () => {
        if (toggle.checked) {
          root.setAttribute('data-theme', 'dark');
          localStorage.setItem('theme', 'dark');
        } else {
          root.removeAttribute('data-theme');
          localStorage.setItem('theme', 'light');
        }
        window.dispatchEvent(new Event('themechange'));
      });
    }
  })();
</script>
</body>
</html>
