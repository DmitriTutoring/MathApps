<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Korepetycje – materiały</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23c4601e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><line x1='9' x2='9' y1='4' y2='20'/><path d='M4 7c0-1.7 1.3-3 3-3h13'/><path d='M18 20c-1.7 0-3-1.3-3-3V4'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Lora:wght@600;700&display=swap" rel="stylesheet">
  <script>
    if (localStorage.getItem('theme') !== 'light') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
  <link rel="stylesheet" href="shared/common.css">
  <style>
    body { min-height: 100dvh; display: flex; flex-direction: column; }
    .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px; gap: 28px; }
    .page-title { font-size: clamp(22px, 5vw, 28px); font-weight: 700; text-align: center; }
    .footer { text-align: center; font-size: 12px; color: var(--text-muted); padding: 16px; }
    @media (max-width: 600px) {
      .main { padding: 24px 16px; gap: 20px; justify-content: flex-start; padding-top: 32px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="topbar-title">Korepetycje</span>
    <button class="theme-btn" id="themeToggle" title="Tryb ciemny / jasny"></button>
  </div>
  <div class="main">
    <h1 class="page-title">Materiały korepetytorskie</h1>
    <div class="card-grid">
      <a href="Books/index.html" class="card">
        <div class="card-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13h4"/><path d="M12 6v7"/><path d="M16 8V6H8v2"/><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"/></svg></div>
        <div><div class="card-title">Podręczniki</div><div class="card-desc">Linki do darmowych podręczników i materiałów online.</div></div>
      </a>
      <a href="Apps/index.html" class="card">
        <div class="card-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.037 4.688a.495.495 0 0 1 .651-.651l16 6.5a.5.5 0 0 1-.063.947l-6.124 1.58a2 2 0 0 0-1.438 1.435l-1.579 6.126a.5.5 0 0 1-.947.063z"/></svg></div>
        <div><div class="card-title">Aplikacje</div><div class="card-desc">Interaktywne wizualizacje matematyczne.</div></div>
      </a>
    </div>
  </div>
  <div class="footer">Twoje narzędzia korepetytorskie</div>
  <script src="shared/theme.js"></script>
</body>
</html>
